<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group 4 | Trendsetters Clothing</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo">GROUP <span>4</span></div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#shop">Shop</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
        <div class="cart-icon">
            <i class="fas fa-shopping-cart"></i>
            <span id="cart-count">0</span>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
        <div class="hero-content">
            <h1>Style for Group 4</h1>
            <p>Interactive. Modern. Elegant.</p>
            <a href="#shop" class="btn">Shop Now</a>
        </div>
    </header>

    <!-- Interactive Product Section -->
    <section id="shop" class="products">
        <h2>Featured Collection</h2>
        <div class="product-grid">
            <!-- Example Product Card -->
            <div class="product-card">
                <div class="product-image">
                    <img src="images/clothes1.jpg" alt="Casual Shirt">
                    <button class="add-to-cart">Add to Cart</button>
                </div>
                <div class="product-info">
                    <h3>Classic Blue Denim</h3>
                    <p>Ksh 2,500</p>
                </div>
            </div>
            <!-- More cards will go here -->
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
